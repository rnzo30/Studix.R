<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ftudix</title>

<style>
body {
  margin:0;
  font-family:"Segoe UI";
  background:#f4f6f8;
}

/* LOGIN */
#loginUI {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-card {
  background:white;
  padding:30px;
  border-radius:20px;
  width:300px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}

.logo {
  color:#ff4b2b;
  font-size:30px;
}

.btn-primary {
  background:#ff4b2b;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* HOME */
.container {
  max-width:600px;
  margin:auto;
  padding:15px;
  padding-bottom:80px;
}

.card {
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:12px;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.grid button {
  padding:20px;
  border:none;
  border-radius:15px;
  background:white;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.hidden { display:none; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginUI">
  <div class="login-card">
    <h1 class="logo">Ftudix</h1>
    <p>Plataforma educativa</p>

    <button class="btn-primary" onclick="login()">Ingresar con Google</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container">

<!-- HOME -->
<div id="home">
  <div class="card">
    <h3 id="user"></h3>
  </div>

  <div class="grid">
    <button onclick="go('books')">📚 Libros</button>
    <button onclick="go('practice')">📝 Ejercicios</button>
    <button onclick="go('chat')">💬 Chat</button>
    <button onclick="go('becas')">🎓 Becas</button>
    <button onclick="go('comunicados')">📢 Comunicados</button>
    <button onclick="go('ia')">🧠 IA</button>
  </div>

  <button id="adminPanel" class="hidden" onclick="go('admin')">⚙️ Admin</button>
</div>

<!-- LIBROS -->
<div id="books" class="hidden">
  <h3>📚 Cursos</h3>
  <div id="listaLibros"></div>
  <button onclick="go('home')">⬅</button>
</div>

<!-- EJERCICIOS -->
<div id="practice" class="hidden">
  <h3>📝 Cursos</h3>
  <div id="listaEjercicios"></div>
  <button onclick="go('home')">⬅</button>
</div>

<!-- CURSO -->
<div id="cursoVista" class="hidden">
  <h3 id="tituloCurso"></h3>
  <div id="contenidoCurso"></div>

  <div id="adminUpload" class="hidden">
    <input type="file" id="archivo">
    <button onclick="subirArchivo()">📤 Subir archivo</button>
  </div>

  <button onclick="volver()">⬅</button>
</div>

<!-- CHAT -->
<div id="chat" class="hidden">
  <h3>💬 Chat</h3>
  <input id="msg">
  <button onclick="enviarMensaje()">Enviar</button>
  <div id="chatBox"></div>
  <button onclick="go('home')">⬅</button>
</div>

<!-- BECAS -->
<div id="becas" class="hidden">
  <div class="card">Beca 18</div>
  <div class="card">Becas universitarias</div>
  <button onclick="go('home')">⬅</button>
</div>

<!-- COMUNICADOS -->
<div id="comunicados" class="hidden">
  <div id="listaComunicados"></div>

  <div id="adminComunicado" class="hidden">
    <input id="nuevoComunicado">
    <button onclick="subirComunicado()">Publicar</button>
  </div>

  <button onclick="go('home')">⬅</button>
</div>

<!-- IA -->
<div id="ia" class="hidden">
  <input id="preguntaIA">
  <button onclick="preguntarIA()">Enviar</button>
  <p id="respuestaIA"></p>
  <button onclick="go('home')">⬅</button>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">
  <h3>Admin</h3>
  <button onclick="go('home')">⬅</button>
</div>

</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAB45cBeULcy0my_i02S5SiPR001SJnLxo",
  authDomain: "studix-83850.firebaseapp.com",
  projectId: "studix-83850",
  storageBucket: "studix-83850.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

const ADMIN_EMAIL = "62934146@gmail.com";

let usuarioActual = null;
let cursoActual = "";
let tipoActual = "";

const cursos = [
"Álgebra","Aritmética","Geometría","Física","Química",
"Razonamiento Matemático","Biología","Lenguaje",
"Razonamiento Verbal","Literatura",
"Historia Universal","Historia del Perú","Geografía"
];

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth().signInWithPopup(provider)
  .then(res=>{
    usuarioActual = res.user;

    document.getElementById("loginUI").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("user").innerText =
      "Hola " + usuarioActual.displayName;

    if(usuarioActual.email === ADMIN_EMAIL){
      document.getElementById("adminPanel").classList.remove("hidden");
      document.getElementById("adminComunicado").classList.remove("hidden");
    }
  });
}

// CURSOS
function cargarCursos(){
  const libros = document.getElementById("listaLibros");
  const ejercicios = document.getElementById("listaEjercicios");

  cursos.forEach(curso => {
    let c1 = document.createElement("div");
    c1.className="card";
    c1.innerText=curso;
    c1.onclick=()=>abrirCurso(curso,"libro");
    libros.appendChild(c1);

    let c2 = document.createElement("div");
    c2.className="card";
    c2.innerText=curso;
    c2.onclick=()=>abrirCurso(curso,"ejercicio");
    ejercicios.appendChild(c2);
  });
}

// CURSO
function abrirCurso(curso,tipo){
  cursoActual = curso;
  tipoActual = tipo;

  go("cursoVista");
  document.getElementById("tituloCurso").innerText = curso;

  if(usuarioActual && usuarioActual.email === ADMIN_EMAIL){
    document.getElementById("adminUpload").classList.remove("hidden");
  }

  cargarContenido();
}

// SUBIR ARCHIVO
function subirArchivo(){
  const file = document.getElementById("archivo").files[0];

  if(!file){
    alert("Selecciona archivo");
    return;
  }

  const ref = storage.ref("materiales/"+file.name);

  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.collection("contenido").add({
        curso: cursoActual,
        tipo: tipoActual,
        url,
        nombre:file.name
      });
      cargarContenido();
    });
  });
}

// CONTENIDO
function cargarContenido(){
  const cont = document.getElementById("contenidoCurso");
  cont.innerHTML="";

  db.collection("contenido")
  .where("curso","==",cursoActual)
  .where("tipo","==",tipoActual)
  .get()
  .then(snap=>{
    snap.forEach(doc=>{
      const d = doc.data();
      cont.innerHTML += `<div class="card">${d.nombre}<br><a href="${d.url}" target="_blank">Ver</a></div>`;
    });
  });
}

// CHAT
function enviarMensaje(){
  if(!usuarioActual){
    alert("Inicia sesión");
    return;
  }

  const msg = document.getElementById("msg").value;

  db.collection("chat").add({
    nombre: usuarioActual.displayName,
    mensaje: msg
  });

  document.getElementById("msg").value="";
}

function cargarChat(){
  db.collection("chat").onSnapshot(snap=>{
    const box = document.getElementById("chatBox");
    box.innerHTML="";
    snap.forEach(doc=>{
      const d = doc.data();
      box.innerHTML += `<div class="card">${d.nombre}: ${d.mensaje}</div>`;
    });
  });
}

// COMUNICADOS
function subirComunicado(){
  const txt = document.getElementById("nuevoComunicado").value;
  db.collection("comunicados").add({texto:txt});
}

function cargarComunicados(){
  db.collection("comunicados").onSnapshot(snap=>{
    const lista = document.getElementById("listaComunicados");
    lista.innerHTML="";
    snap.forEach(doc=>{
      lista.innerHTML += `<div class="card">${doc.data().texto}</div>`;
    });
  });
}

// IA
function preguntarIA(){
  const q = document.getElementById("preguntaIA").value;
  document.getElementById("respuestaIA").innerText = "Sigue estudiando 📚";
}

// NAV
function go(id){
  document.querySelectorAll('.container > div').forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");

  if(id==="chat") cargarChat();
  if(id==="comunicados") cargarComunicados();
}

function volver(){
  go(tipoActual==="libro"?"books":"practice");
}

cargarCursos();
</script>

</body>
</html>
