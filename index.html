<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trilce Smart</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f4f6f8;
}

header {
  background: #d32f2f;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 15px;
  padding-bottom: 80px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 12px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #d32f2f;
  color: white;
  cursor: pointer;
  margin-top: 5px;
  width: 100%;
}

.hidden { display: none; }

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
}

.nav button {
  background: none;
  color: #d32f2f;
}
</style>
</head>

<body>

<header>Trilce Smart 🚀</header>

<div class="container">

<!-- HOME -->
<div id="home">
  <div class="card">
    <h3 id="welcome">Hola 👋</h3>
    <p id="exam">📅 Sin datos</p>
  </div>

  <button onclick="login()">🔐 Iniciar con Google</button>
  <p id="user"></p>

  <button onclick="go('courses')">📚 Cursos</button>

  <!-- SOLO ADMIN -->
  <button id="adminPanel" class="hidden" onclick="go('admin')">⚙️ Panel Admin</button>
</div>

<!-- CURSOS -->
<div id="courses" class="hidden">
  <div class="card"><h3>Álgebra</h3></div>
  <div class="card"><h3>Aritmética</h3></div>
  <div class="card"><h3>Geometría</h3></div>
  <div class="card"><h3>Física</h3></div>
  <div class="card"><h3>Química</h3></div>
  <div class="card"><h3>Razonamiento Matemático</h3></div>
  <div class="card"><h3>Biología</h3></div>
  <div class="card"><h3>Lenguaje</h3></div>
  <div class="card"><h3>Razonamiento Verbal</h3></div>
  <div class="card"><h3>Literatura</h3></div>
  <div class="card"><h3>Historia Universal</h3></div>
  <div class="card"><h3>Historia del Perú</h3></div>
  <div class="card"><h3>Geografía</h3></div>

  <button onclick="go('home')">⬅ Volver</button>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">
  <div class="card">
    <h3>Panel de Administración 🔥</h3>
    <p>Solo tú puedes ver esto</p>

    <input id="material" placeholder="Nombre del material">
    <button onclick="subirMaterial()">📤 Subir Material</button>

    <p id="estado"></p>

    <button onclick="go('home')">⬅ Volver</button>
  </div>
</div>

</div>

<div class="nav">
  <button onclick="go('home')">🏠</button>
  <button onclick="go('courses')">📚</button>
</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAB45cBeULcy0my_i02S5SiPR001SJnLxo",
  authDomain: "studix-83850.firebaseapp.com",
  projectId: "studix-83850",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ⚠️ CAMBIA ESTO POR TU CORREO
const ADMIN_EMAIL = "TU_CORREO@gmail.com";

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth().signInWithPopup(provider)
    .then(result => {
      const user = result.user;

      document.getElementById("user").innerText =
        "Bienvenido " + user.displayName;

      guardarUsuario(user);

      // ACTIVAR ADMIN
      if(user.email === ADMIN_EMAIL){
        document.getElementById("adminPanel").classList.remove("hidden");
      }
    })
    .catch(error => console.log(error));
}

// GUARDAR USUARIO
function guardarUsuario(user){
  db.collection("usuarios").doc(user.uid).set({
    nombre: user.displayName,
    email: user.email
  });
}

// SUBIR MATERIAL (ADMIN)
function subirMaterial(){
  const texto = document.getElementById("material").value;

  db.collection("materiales").add({
    contenido: texto,
    fecha: new Date()
  })
  .then(()=>{
    document.getElementById("estado").innerText = "✅ Subido correctamente";
  });
}

// NAVEGACIÓN
function go(id){
  document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
</script>

</body>
</html>
