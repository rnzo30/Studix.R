<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ftudix PRO</title>

<style>
body { margin:0; font-family:"Segoe UI"; background:#f4f6f8; }

#loginUI { display:flex; justify-content:center; align-items:center; height:100vh; }
.login-card { background:white; padding:30px; border-radius:20px; width:300px; text-align:center; }

.btn { background:#ff4b2b; color:white; border:none; padding:12px; width:100%; border-radius:10px; margin-top:10px; }

.container { max-width:600px; margin:auto; padding:15px; padding-bottom:80px; }

.card { background:white; padding:15px; border-radius:15px; margin-bottom:10px; }

.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.grid button { padding:20px; border:none; border-radius:15px; background:white; }

.hidden { display:none; }

#chatBox { height:250px; overflow-y:auto; background:#f1f1f1; padding:10px; border-radius:10px; }

.chat-item {
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  cursor:pointer;
}

.chat-item:hover { background:#eee; }
</style>
</head>

<body>

<div id="loginUI">
  <div class="login-card">
    <h1>Ftudix 🚀</h1>
    <button class="btn" onclick="login()">Ingresar con Google</button>
  </div>
</div>

<div id="app" class="hidden">
<div class="container">

<div id="home">
  <h3 id="user"></h3>

  <div class="grid">
    <button onclick="go('books')">📚 Libros</button>
    <button onclick="go('practice')">📝 Ejercicios</button>
    <button onclick="go('chat')">💬 Chat</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="hidden">

  <h3>💬 Chats</h3>
  <div id="listaChats"></div>

  <hr>

  <input id="buscarInput" onkeyup="buscarUsuarios()" placeholder="Buscar usuario...">
  <div id="resultados"></div>

  <hr>

  <h4>Conversación</h4>
  <div id="chatBox"></div>

  <input id="msg" placeholder="Mensaje">
  <button onclick="enviarMensaje()">Enviar</button>

  <button onclick="go('home')">⬅</button>
</div>

</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAB45cBeULcy0my_i02S5SiPR001SJnLxo",
  authDomain: "studix-83850.firebaseapp.com",
  projectId: "studix-83850"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let usuarioActual = null;
let chatActual = "";
let unsubscribeChat = null;

/* LOGIN */
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth().signInWithPopup(provider)
  .then(res=>{
    usuarioActual = res.user;

    guardarUsuario(usuarioActual);

    document.getElementById("loginUI").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("user").innerText =
      "Hola " + usuarioActual.displayName;

    cargarListaChats();
  });
}

/* GUARDAR USUARIO */
function guardarUsuario(user){
  db.collection("usuarios").doc(user.uid).set({
    nombre:user.displayName,
    email:user.email
  },{merge:true});
}

/* BUSCAR USUARIOS */
function buscarUsuarios(){
  const texto=document.getElementById("buscarInput").value.toLowerCase();
  const cont=document.getElementById("resultados");
  cont.innerHTML="";

  db.collection("usuarios").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      const u=doc.data();

      if(u.nombre && u.nombre.toLowerCase().includes(texto)){
        let div=document.createElement("div");
        div.className="card";
        div.innerText=u.nombre;

        div.onclick=()=>{
          abrirChat(doc.id);
        };

        cont.appendChild(div);
      }
    });
  });
}

/* ABRIR CHAT */
function abrirChat(uid){
  const uid1=usuarioActual.uid;

  chatActual = uid1 < uid ? uid1+"_"+uid : uid+"_"+uid1;

  cargarChat();
}

/* ENVIAR MENSAJE */
function enviarMensaje(){
  if(!chatActual) return alert("Selecciona usuario");

  const msg=document.getElementById("msg").value.trim();
  if(!msg) return;

  db.collection("chats")
  .doc(chatActual)
  .collection("mensajes")
  .add({
    uid:usuarioActual.uid,
    nombre:usuarioActual.displayName,
    mensaje:msg,
    fecha:firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("msg").value="";
}

/* CHAT REALTIME */
function cargarChat(){
  if(unsubscribeChat) unsubscribeChat();

  unsubscribeChat = db
  .collection("chats")
  .doc(chatActual)
  .collection("mensajes")
  .orderBy("fecha")
  .onSnapshot(snap=>{

    const box=document.getElementById("chatBox");
    box.innerHTML="";

    snap.forEach(doc=>{
      const d=doc.data();
      const esMio=d.uid===usuarioActual.uid;

      box.innerHTML+=`
        <div style="text-align:${esMio?"right":"left"}">
          <div style="
            display:inline-block;
            background:${esMio?"#ff4b2b":"#ddd"};
            color:${esMio?"white":"black"};
            padding:8px;
            border-radius:10px;
            margin:4px;
          ">
            ${d.mensaje}
          </div>
        </div>
      `;
    });

    box.scrollTop=box.scrollHeight;
  });
}

/* LISTA DE CHATS */
function cargarListaChats(){
  db.collection("chats").onSnapshot(snapshot=>{
    const lista=document.getElementById("listaChats");
    lista.innerHTML="";

    snapshot.forEach(doc=>{
      const id=doc.id;

      if(!id.includes(usuarioActual.uid)) return;

      const otro = id.replace(usuarioActual.uid,"").replace("_","");

      db.collection("usuarios").doc(otro).get().then(userDoc=>{
        const nombre = userDoc.data()?.nombre || "Usuario";

        let div=document.createElement("div");
        div.className="chat-item";
        div.innerText=nombre;

        div.onclick=()=>{
          chatActual=id;
          cargarChat();
        };

        lista.appendChild(div);
      });
    });
  });
}

/* NAV */
function go(id){
  document.querySelectorAll('.container > div').forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
